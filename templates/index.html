<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h2 class="text-center mt-4">CommonBlog.com</h2>
    <form class="container mt-5">
      <a href="/logout" class="form">Logout</a><br><br>   
      <div class="comField">
        <input id="title" class="form-control" placeholder="Title"><br>
        <textarea id="content" placeholder="Write your post here..." class="form-control"></textarea><br>
        <button class="btn btn-primary" onclick="addPost()">Add</button>
      </div>
      <div id="posts"></div>
    </form>
<script src="{{ url_for('static', filename='script.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
