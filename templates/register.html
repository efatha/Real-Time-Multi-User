<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h2 class="text-center mt-4">Register</h2>
    <form class="container mt-3" method="POST">
        <input name="username" placeholder="Username" class="form-control"><br>
        <input name="password" type="password" placeholder="Password" class="form-control"><br>
        <button class="btn btn-primary">Register</button>
</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
